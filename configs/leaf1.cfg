# --- Underlay & Interfaces ---
set / interface system0 subinterface 0 ipv4 address 10.10.10.1/32
set / interface ethernet-1/1 subinterface 0 ipv4 address 10.0.1.1/30
set / interface ethernet-1/2 subinterface 0 ipv4 address 10.0.2.1/30
set / interface system0 admin-state enable
set / interface ethernet-1/1 admin-state enable
set / interface ethernet-1/2 admin-state enable

set / network-instance default type default
set / network-instance default router-id 10.10.10.1
set / network-instance default interface ethernet-1/1.0
set / network-instance default interface ethernet-1/2.0
set / network-instance default interface system0.0

set / network-instance default protocols ospf instance default admin-state enable
set / network-instance default protocols ospf instance default router-id 10.10.10.1
set / network-instance default protocols ospf instance default version ospf-v2
set / network-instance default protocols ospf instance default area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
set / network-instance default protocols ospf instance default area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
set / network-instance default protocols ospf instance default area 0.0.0.0 interface system0.0 passive true

# --- BGP EVPN  ---
set / network-instance default protocols bgp admin-state enable
set / network-instance default protocols bgp autonomous-system 65001
set / network-instance default protocols bgp router-id 10.10.10.1
set / network-instance default protocols bgp afi-safi evpn admin-state enable
set / network-instance default protocols bgp group ibgp-evpn peer-as 65001
set / network-instance default protocols bgp neighbor 1.1.1.1 peer-group ibgp-evpn
set / network-instance default protocols bgp neighbor 2.2.2.2 peer-group ibgp-evpn

# --- VXLAN Service (Fixed VXLAN interface binding) ---

set / tunnel-interface vxlan0 vxlan-interface 10 type bridged
set / tunnel-interface vxlan0 vxlan-interface 10 ingress vni 1010

set / interface ethernet-1/3 admin-state enable


set / network-instance vlan10 type mac-vrf
set / network-instance vlan10 admin-state enable
set / network-instance vlan10 vxlan-interface vxlan0.10
set / network-instance vlan10 protocols bgp-evpn bgp-instance 1 admin-state enable vxlan-interface vxlan0.10 evi 10
set / network-instance vlan10 protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.10.10.1:10
set / network-instance vlan10 protocols bgp-vpn bgp-instance 1 route-target export-rt target:65001:10 import-rt target:65001:10
set / network-instance vlan10 protocols bgp-evpn bgp-instance 1 encapsulation-type vxlan



# --- Configuration du service VXLAN pour le VLAN 20 ---
set / tunnel-interface vxlan0 vxlan-interface 20 type bridged
set / tunnel-interface vxlan0 vxlan-interface 20 ingress vni 1020

# --- Configuration de l'interface physique (Connectée à srv2/srv4) ---
set / interface ethernet-1/4 admin-state enable
set / interface ethernet-1/4 vlan-tagging true
set / interface ethernet-1/4 subinterface 20 type bridged vlan encap single-tagged vlan-id 20

# --- Création du MAC-VRF (VLAN 20) et liaison des interfaces ---
set / network-instance vlan20 type mac-vrf
set / network-instance vlan20 admin-state enable
set / network-instance vlan20 interface ethernet-1/4.20
set / network-instance vlan20 vxlan-interface vxlan0.20

# --- Configuration EVPN et Route Targets (RT) ---
set / network-instance vlan20 protocols bgp-evpn bgp-instance 1 admin-state enable vxlan-interface vxlan0.20 evi 20
set / network-instance vlan20 protocols bgp-vpn bgp-instance 1 route-target export-rt target:65001:20 import-rt target:65001:20
set / network-instance vlan20 protocols bgp-vpn bgp-instance 1 route-distinguisher rd 10.10.10.1:20
set / network-instance vlan20 protocols bgp-evpn bgp-instance 1 encapsulation-type vxlan


#====== L3 Asymetric Routing ========:

#---- l'interface IRB et Anycact Gateway
set / interface irb1 admin-state enable

# --- Vlan 10 Gateway ---
set / interface irb1 subinterface 10 ipv4 admin-state enable
set / interface irb1 subinterface 10 ipv4 address 192.168.10.254/24 anycast-gw true
set / interface irb1 subinterface 10 anycast-gw anycast-gw-mac 00:00:5E:00:01:01
set / interface irb1 subinterface 10 ipv4 arp host-route populate dynamic

    #--- BGP EVPN ARP Sync (Leaf 1 & Leaf 2)
set / interface irb1 subinterface 10 ipv4 arp evpn advertise dynamic
set / interface irb1 subinterface 10 ipv4 arp learn-unsolicited true

# --- Vlan 20 Gateway ---
set / interface irb1 subinterface 20 ipv4 admin-state enable
set / interface irb1 subinterface 20 ipv4 address 192.168.20.254/24 anycast-gw true
set / interface irb1 subinterface 20 anycast-gw anycast-gw-mac 00:00:5E:00:01:01
set / interface irb1 subinterface 20 ipv4 arp host-route populate dynamic
     #--- BGP EVPN ARP Sync (Leaf 1 & Leaf 2)
set / interface irb1 subinterface 20 ipv4 arp evpn advertise dynamic
set / interface irb1 subinterface 20 ipv4 arp learn-unsolicited true

#---- liaisons entre IRB et MAC-VRF (L2)

set / network-instance vlan10 interface irb1.10
set / network-instance vlan20 interface irb1.20

#---- IP-VRF et IRB
set / network-instance ip-vrf-1 type ip-vrf
set / network-instance ip-vrf-1 admin-state enable
set / network-instance ip-vrf-1 interface irb1.10
set / network-instance ip-vrf-1 interface irb1.20


# =============================
# l'Ajout du protocole LACP 
# =============================

# --- Créer LAG1 (LACP) ---
set / interface lag1 admin-state enable
set / interface lag1 vlan-tagging true
set / interface lag1 lag lag-type lacp
set / interface lag1 lag lacp system-id-mac 00:00:00:00:00:11
set / interface lag1 lag lacp system-priority 11

# --- ports physiques dans LAG1---
set / interface ethernet-1/3 admin-state enable
set / interface ethernet-1/3 ethernet aggregate-id lag1

# --- liaison de subinterface 10 avec MAC-VRF (vlan10) ---
set / interface lag1 subinterface 10 type bridged
set / interface lag1 subinterface 10 vlan encap single-tagged vlan-id 10
set / network-instance vlan10 interface lag1.10

# --- Création du BGP-VPN Instance 1 dans System (pour l'ESI) ---
set / system network-instance protocols bgp-vpn bgp-instance 1

# --- Ethernet Segment (Multihoming All-Active) ---
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment ES-SRV1 admin-state enable
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment ES-SRV1 esi 01:00:00:00:00:11:11:11:11:11
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment ES-SRV1 multi-homing-mode all-active
set / system network-instance protocols evpn ethernet-segments bgp-instance 1 ethernet-segment ES-SRV1 interface lag1

