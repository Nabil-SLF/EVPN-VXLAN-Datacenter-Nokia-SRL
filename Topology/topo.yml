name: pro-evpn

topology:
  nodes:

    spine1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux

    spine2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux

    leaf1:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux

    leaf2:
      kind: nokia_srlinux
      image: ghcr.io/nokia/srlinux

    srv1:
      kind: linux
      image: alpine:latest
      exec:
        # --- Création du Bond et Injection Kernel pour 802.3ad ---
        - ip link add bond0 type bond
        - ip link set bond0 down
        - sh -c "echo '802.3ad' > /sys/class/net/bond0/bonding/mode"
        - sh -c "echo 100 > /sys/class/net/bond0/bonding/miimon"
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        # --- Création du VLAN 10 ---
        - ip link add link bond0 name bond0.10 type vlan id 10
        - ip link set bond0.10 up
        - ip addr add 192.168.10.1/24 dev bond0.10
        # --- Ajout du Route explicite ---
        - ip route add 192.168.0.0/16 via 192.168.10.254 dev bond0.10

    srv2:
      kind: linux
      image: alpine:latest
      exec:
        # --- Création du Bond et Injection Kernel pour 802.3ad ---
        - ip link add bond0 type bond
        - ip link set bond0 down
        - sh -c "echo '802.3ad' > /sys/class/net/bond0/bonding/mode"
        - sh -c "echo 100 > /sys/class/net/bond0/bonding/miimon"
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        # --- Création du VLAN 20 ---
        - ip link add link bond0 name bond0.20 type vlan id 20
        - ip link set bond0.20 up
        - ip addr add 192.168.20.2/24 dev bond0.20
        # --- Ajout du Route explicite ---
        - ip route add 192.168.0.0/16 via 192.168.20.254 dev bond0.20

    srv3:
      kind: linux
      image: alpine:latest
      exec:
        # --- Création du Bond et Injection Kernel pour 802.3ad ---
        - ip link add bond0 type bond
        - ip link set bond0 down
        - sh -c "echo '802.3ad' > /sys/class/net/bond0/bonding/mode"
        - sh -c "echo 100 > /sys/class/net/bond0/bonding/miimon"
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        # --- Création du VLAN 10 ---
        - ip link add link bond0 name bond0.10 type vlan id 10
        - ip link set bond0.10 up
        - ip addr add 192.168.10.3/24 dev bond0.10
        # --- Ajout du Route explicite ---
        - ip route add 192.168.0.0/16 via 192.168.10.254 dev bond0.10
    srv4:
      kind: linux
      image: alpine:latest
      exec:
        # --- Création du Bond et Injection Kernel pour 802.3ad ---
        - ip link add bond0 type bond
        - ip link set bond0 down
        - sh -c "echo '802.3ad' > /sys/class/net/bond0/bonding/mode"
        - sh -c "echo 100 > /sys/class/net/bond0/bonding/miimon"
        - ip link set eth1 down
        - ip link set eth2 down
        - ip link set eth1 master bond0
        - ip link set eth2 master bond0
        - ip link set eth1 up
        - ip link set eth2 up
        - ip link set bond0 up
        # --- Création du VLAN 20 ---
        - ip link add link bond0 name bond0.20 type vlan id 20
        - ip link set bond0.20 up
        - ip addr add 192.168.20.4/24 dev bond0.20
        # --- Ajout du Route explicite ---
        - ip route add 192.168.0.0/16 via 192.168.20.254 dev bond0.20


  links:
    # --- Liens entre Spines et Leafs ---
    - endpoints: ["leaf1:e1-1", "spine1:e1-1"]
    - endpoints: ["leaf1:e1-2", "spine2:e1-1"]
    - endpoints: ["leaf2:e1-1", "spine1:e1-2"]
    - endpoints: ["leaf2:e1-2", "spine2:e1-2"]

    # --- Serveur 1 (Multihomed) ---
    - endpoints: ["srv1:eth1", "leaf1:e1-3"]
    - endpoints: ["srv1:eth2", "leaf2:e1-5"]  # Nouveau lien vers Leaf 2

    # --- Serveur 2 (Multihomed) ---
    - endpoints: ["srv2:eth1", "leaf1:e1-4"]
    - endpoints: ["srv2:eth2", "leaf2:e1-6"]  # Nouveau lien vers Leaf 2

    # --- Serveur 3 (Multihomed) ---
    - endpoints: ["srv3:eth1", "leaf2:e1-3"]
    - endpoints: ["srv3:eth2", "leaf1:e1-5"]  # Nouveau lien vers Leaf 1

    # --- Serveur 4 (Multihomed) ---
    - endpoints: ["srv4:eth1", "leaf2:e1-4"]
    - endpoints: ["srv4:eth2", "leaf1:e1-6"]  # Nouveau lien vers Leaf 1
